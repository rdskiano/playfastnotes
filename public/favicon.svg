<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#251a10"/>
      <stop offset="100%" stop-color="#0d0a07"/>
    </radialGradient>
    <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="40%" stop-color="#e8c96a"/>
      <stop offset="100%" stop-color="#b8782a"/>
    </linearGradient>
    <linearGradient id="sg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a2a0a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#c8501a" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="sg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9a6010" stop-opacity="0"/>
      <stop offset="100%" stop-color="#d8a030" stop-opacity="0.65"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Speed streaks - three tiers, angled ~-14deg, fading left to right -->
  <g transform="rotate(-14, 256, 256)">
    <!-- Upper streak group -->
    <rect x="30" y="148" width="220" height="9"  rx="4.5" fill="url(#sg1)"/>
    <rect x="30" y="164" width="185" height="6"  rx="3"   fill="url(#sg2)"/>
    <rect x="30" y="177" width="150" height="4"  rx="2"   fill="url(#sg1)" opacity="0.6"/>

    <!-- Middle streak group -->
    <rect x="100" y="228" width="220" height="9"  rx="4.5" fill="url(#sg2)"/>
    <rect x="100" y="244" width="185" height="6"  rx="3"   fill="url(#sg1)"/>
    <rect x="100" y="257" width="150" height="4"  rx="2"   fill="url(#sg2)" opacity="0.6"/>

    <!-- Lower streak group -->
    <rect x="170" y="308" width="220" height="9"  rx="4.5" fill="url(#sg1)"/>
    <rect x="170" y="324" width="185" height="6"  rx="3"   fill="url(#sg2)"/>
    <rect x="170" y="337" width="150" height="4"  rx="2"   fill="url(#sg1)" opacity="0.6"/>
  </g>

  <!-- The three-note group, tilted, with glow -->
  <g filter="url(#glow)" transform="translate(256,256) rotate(-14) translate(-256,-256)">

    <!-- BEAM 1 (thick, main) -->
    <polygon points="152,195 382,130 382,158 152,223" fill="url(#ng)"/>
    <!-- BEAM 2 (second beam for sixteenth) -->
    <polygon points="152,230 382,165 382,193 152,258" fill="url(#ng)" opacity="0.9"/>

    <!-- STEM 1 -->
    <rect x="148" y="210" width="16" height="125" rx="8" fill="url(#ng)"/>
    <!-- NOTEHEAD 1 -->
    <ellipse cx="144" cy="338" rx="34" ry="24" fill="url(#ng)" transform="rotate(-14,144,338)"/>
    <!-- notehead hole -->
    <ellipse cx="144" cy="338" rx="16" ry="10" fill="#1a1008" opacity="0.5" transform="rotate(-14,144,338)"/>

    <!-- STEM 2 -->
    <rect x="248" y="170" width="16" height="125" rx="8" fill="url(#ng)"/>
    <!-- NOTEHEAD 2 -->
    <ellipse cx="244" cy="298" rx="34" ry="24" fill="url(#ng)" transform="rotate(-14,244,298)"/>
    <ellipse cx="244" cy="298" rx="16" ry="10" fill="#1a1008" opacity="0.5" transform="rotate(-14,244,298)"/>

    <!-- STEM 3 -->
    <rect x="348" y="135" width="16" height="125" rx="8" fill="url(#ng)"/>
    <!-- NOTEHEAD 3 -->
    <ellipse cx="344" cy="263" rx="34" ry="24" fill="url(#ng)" transform="rotate(-14,344,263)"/>
    <ellipse cx="344" cy="263" rx="16" ry="10" fill="#1a1008" opacity="0.5" transform="rotate(-14,344,263)"/>

  </g>

  <!-- Subtle accent dots suggesting more notes trailing off -->
  <g filter="url(#softglow)" opacity="0.5">
    <ellipse cx="430" cy="390" rx="12" ry="9" fill="#e8c96a" transform="rotate(-14,430,390)"/>
    <ellipse cx="460" cy="370" rx="9"  ry="7" fill="#e8c96a" transform="rotate(-14,460,370)" opacity="0.6"/>
    <ellipse cx="485" cy="352" rx="6"  ry="5" fill="#e8c96a" transform="rotate(-14,485,352)" opacity="0.35"/>
  </g>

</svg>
